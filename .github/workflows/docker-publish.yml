name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-wordpress:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for WordPress
        id: meta-wp
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push WordPress image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta-wp.outputs.tags }}
          labels: ${{ steps.meta-wp.outputs.labels }}

  build-and-push-mail-relay:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Mail Relay
        id: meta-mail
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mail-relay
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Mail Relay image
        uses: docker/build-push-action@v7
        with:
          context: ./mail-relay
          push: true
          tags: ${{ steps.meta-mail.outputs.tags }}
          labels: ${{ steps.meta-mail.outputs.labels }}

  build-and-push-mariadb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for MariaDB
        id: meta-mariadb
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mariadb
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push MariaDB image
        uses: docker/build-push-action@v7
        with:
          context: ./mariadb
          push: true
          tags: ${{ steps.meta-mariadb.outputs.tags }}
          labels: ${{ steps.meta-mariadb.outputs.labels }}

  generate-dokploy-payload:
    needs: [build-and-push-wordpress, build-and-push-mail-relay, build-and-push-mariadb]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the payload file back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate Payload
        id: generate
        run: |
          PAYLOAD=$(python3 generate_dokploy_base64.py)
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT
          echo "$PAYLOAD" > DOKPLOY_PAYLOAD.txt

      - name: Update GitHub Job Summary
        run: |
          echo "## 🚀 Dokploy Deployment Payload" >> $GITHUB_STEP_SUMMARY
          echo "Copy the Base64 code below and paste it into Dokploy's **Compose** section." >> $GITHUB_STEP_SUMMARY
          echo " " >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.generate.outputs.payload }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push Payload File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add DOKPLOY_PAYLOAD.txt
          git commit -m "docs: update dokploy deployment payload [skip ci]" || echo "No changes to commit"
          git push
