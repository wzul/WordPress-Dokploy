services:
  wordpress:
    build: .
    entrypoint: [ "bash", "/usr/local/bin/docker-entrypoint-extra.sh" ]
    volumes:
      - wp_app:/var/www/html
      - ./php:/tmp/php:ro
      - ./php/docker-entrypoint-extra.sh:/usr/local/bin/docker-entrypoint-extra.sh:ro
      - ./ols:/tmp/ols:ro
    init: true
    env_file: "env.patch"
    restart: unless-stopped

  mail-relay:
    build: ./mail-relay
    environment:
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-localhost}
      - SES_TENANT_TAG=${SES_TENANT_TAG}
    restart: unless-stopped

  valkey:
    image: valkey/valkey:latest
    command: valkey-server --protected-mode no
    restart: unless-stopped

volumes:
  wp_app:
