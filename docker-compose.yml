services:
  wordpress:
    build: .
    volumes:
      - wp_app:/var/www/html
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./php/mail.ini:/usr/local/etc/php/conf.d/mail.ini
      - ./php/fpm-pool.conf:/usr/local/etc/php-fpm.d/zz-dokploy.conf
      - ./php/msmtprc:/etc/msmtprc:ro
      - ./php/adminer-auth.php:/var/www/html/adminer-auth.php
    init: true
    env_file:
      - .env
    environment:
      - ADMINER_DESIGN=${ADMINER_DESIGN:-pepa-linha}
    restart: unless-stopped

  ols:
    image: litespeedtech/openlitespeed:latest
    command: >
      sh -c "
      # 1. Force Permissions for OLS (lshttpd)
      chown -R 999:999 /var/www/html &&
      
      # 2. Fix OLS Virtual Host paths
      # The default template uses vhRoot /var/www/vhosts/$$VH_NAME/
      # We change it to /var/www/ so $$VH_ROOT/html becomes /var/www/html
      sed -i 's|vhRoot.*|vhRoot /var/www/|g' /usr/local/lsws/conf/templates/docker.conf &&
      sed -i 's|restrained\s*1|restrained 0|g' /usr/local/lsws/conf/templates/docker.conf &&

      export FM_PATH=$${FILE_MANAGER_PATH:-/file-manager-secret} &&
      export DB_PATH=$${DB_MANAGER_PATH:-/wp-db-admin} &&
      export FM_PATH_SLASH=$${FM_PATH%/}/ &&
      export FM_PATH_NO_SLASH=$${FM_PATH%/} &&

      # 3. Inject secret paths and apply custom config to the 'localhost' vhost
      mkdir -p /usr/local/lsws/conf/vhosts/localhost &&
      sed \"s|FILE_MANAGER_PATH_PLACEHOLDER|$$FM_PATH_SLASH|g\" /tmp/custom_vhconf.conf > /usr/local/lsws/conf/vhosts/localhost/vhconf.conf &&
      sed -i \"s|FILE_MANAGER_PATH_STRIPPED|$$FM_PATH_NO_SLASH|g\" /usr/local/lsws/conf/vhosts/localhost/vhconf.conf &&
      sed -i \"s|DB_MANAGER_PATH_PLACEHOLDER|$$DB_PATH|g\" /usr/local/lsws/conf/vhosts/localhost/vhconf.conf &&
      chown -R 999:999 /usr/local/lsws/conf/vhosts/localhost &&

      /usr/local/lsws/bin/lswsctrl start &&
      tail -f /usr/local/lsws/logs/error.log
      "
    volumes:
      - wp_app:/var/www/html
      - ./ols/vhconf.conf:/tmp/custom_vhconf.conf
    environment:
      - OLS_PASSWORD=${OLS_PASSWORD:-admin123}
      - FILE_MANAGER_PATH=${FILE_MANAGER_PATH:-/file-manager-secret}
      - DB_MANAGER_PATH=${DB_MANAGER_PATH:-/wp-db-admin}
    restart: unless-stopped
    depends_on:
      - wordpress

  mail-relay:
    build: ./mail-relay
    environment:
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-localhost}
      - SES_TENANT_TAG=${SES_TENANT_TAG}
    restart: unless-stopped

  file-manager:
    image: filebrowser/filebrowser:latest
    user: "33:33"
    command: >
      sh -c "
      if [ ! -f /database/filebrowser.db ]; then
        /filebrowser config init --database /database/filebrowser.db &&
        /filebrowser config set --database /database/filebrowser.db --baseurl /file-manager &&
        /filebrowser users add $${FILE_MANAGER_USER:-admin} $${FILE_MANAGER_PASSWORD:-admin123} --perm.admin --database /database/filebrowser.db
      fi &&
      /filebrowser server --database /database/filebrowser.db
      "
    volumes:
      - wp_app:/srv
      - filebrowser_db:/database
    environment:
      - FILE_MANAGER_USER=${FILE_MANAGER_USER:-admin}
      - FILE_MANAGER_PASSWORD=${FILE_MANAGER_PASSWORD}
      - FB_BASEURL=${FILE_MANAGER_PATH:-/file-manager-secret}
    restart: unless-stopped

volumes:
  wp_app:
  filebrowser_db:
