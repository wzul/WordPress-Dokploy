services:
  wordpress:
    build: .
    ports:
      - "8080:80"
      - "7080:7080"
    volumes:
      - wp_app:/var/www/html
    init: true
    env_file: ".env"
    restart: unless-stopped

  mail-relay:
    build: ./mail-relay
    env_file: ".env"
    restart: unless-stopped

  valkey:
    image: valkey/valkey:latest
    command: valkey-server --protected-mode no
    restart: unless-stopped

volumes:
  wp_app:
