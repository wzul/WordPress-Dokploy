services:
  wordpress:
    build: .
    volumes:
      - wp_app:/var/www/html
      - ./php/uploads.ini:/tmp/uploads.ini.template:ro
      - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./php/mail.ini:/usr/local/etc/php/conf.d/mail.ini
      - ./php/fpm-pool.conf:/tmp/fpm-pool.conf.template:ro
      - ./php/msmtprc:/etc/msmtprc:ro
      - ./php/adminer-auth.php:/var/www/html/adminer-auth.php
    init: true
    env_file:
      - .env
    environment:
      - ADMINER_DESIGN=${ADMINER_DESIGN:-pepa-linha}
    restart: unless-stopped

  ols:
    image: litespeedtech/openlitespeed:latest
    command: >
      sh -c "
      export FM_PATH=$${FILE_MANAGER_PATH:-/file-manager-secret} &&
      export DB_PATH=$${DB_MANAGER_PATH:-/wp-db-admin} &&
      export FM_PATH_SLASH=$${FM_PATH%/}/ &&
      export FM_PATH_NO_SLASH=$${FM_PATH%/} &&
      
      cp /tmp/vhconf.conf.template /usr/local/lsws/conf/vhosts/localhost/vhconf.conf &&
      sed -i \"s|FILE_MANAGER_PATH_PLACEHOLDER|$$FM_PATH_SLASH|g\" /usr/local/lsws/conf/vhosts/localhost/vhconf.conf &&
      sed -i \"s|FILE_MANAGER_PATH_STRIPPED|$$FM_PATH_NO_SLASH|g\" /usr/local/lsws/conf/vhosts/localhost/vhconf.conf &&
      sed -i \"s|DB_MANAGER_PATH_PLACEHOLDER|$$DB_PATH|g\" /usr/local/lsws/conf/vhosts/localhost/vhconf.conf &&

      /entrypoint.sh
      "
    volumes:
      - wp_app:/var/www/html
      - ./ols/vhosts/localhost/vhconf.conf:/tmp/vhconf.conf.template:ro
      - ./ols/templates/docker.conf:/usr/local/lsws/conf/templates/docker.conf
    environment:
      - OLS_PASSWORD=${OLS_PASSWORD:-admin123}
      - FILE_MANAGER_PATH=${FILE_MANAGER_PATH:-/file-manager-secret}
      - DB_MANAGER_PATH=${DB_MANAGER_PATH:-/wp-db-admin}
    restart: unless-stopped
    depends_on:
      - wordpress

  mail-relay:
    build: ./mail-relay
    environment:
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-localhost}
      - SES_TENANT_TAG=${SES_TENANT_TAG}
    restart: unless-stopped

  file-manager:
    image: filebrowser/filebrowser:latest
    user: "33:33"
    entrypoint: ["sh", "-c"]
    command: >
      "if [ ! -f /srv/.filebrowser.db ]; then
        filebrowser config init --database /srv/.filebrowser.db &&
        filebrowser config set --database /srv/.filebrowser.db --baseurl /file-manager --port 80 --address 0.0.0.0 &&
        filebrowser users add $${FILE_MANAGER_USER:-admin} $${FILE_MANAGER_PASSWORD:-admin12345678} --perm.admin --database /srv/.filebrowser.db
      fi && filebrowser --database /srv/.filebrowser.db --port 80 --address 0.0.0.0"
    volumes:
      - wp_app:/srv
    environment:
      - FILE_MANAGER_USER=${FILE_MANAGER_USER:-admin}
      - FILE_MANAGER_PASSWORD=${FILE_MANAGER_PASSWORD}
      - FB_BASEURL=${FILE_MANAGER_PATH:-/file-manager-secret}
    restart: unless-stopped

volumes:
  wp_app:
