services:
  wordpress:
    image: ghcr.io/wzul/wordpress-dokploy:latest
    volumes:
      - wp_app:/var/www/html
    init: true
    env_file: ".env"
    restart: unless-stopped

  mail-relay:
    image: ghcr.io/wzul/wordpress-dokploy-mail-relay:latest
    env_file: ".env"
    restart: unless-stopped

  valkey:
    image: valkey/valkey:latest
    command: valkey-server --protected-mode no --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    restart: unless-stopped

volumes:
  wp_app:
