services:
  wordpress:
    build: .
    volumes:
      - wp_app:/var/www/html
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./php/mail.ini:/usr/local/etc/php/conf.d/mail.ini
      - ./php/fpm-pool.conf:/usr/local/etc/php-fpm.d/zz-dokploy.conf
      - ./php/msmtprc:/etc/msmtprc:ro
    env_file:
      - .env
    restart: unless-stopped

  ols:
    image: litespeedtech/openlitespeed:latest
    ports:
      - "80:80"
      - "7080:7080"
    volumes:
      - wp_app:/var/www/html
      - ./ols/vhconf.conf:/usr/local/lsws/conf/vhosts/Example/vhconf.conf
    environment:
      - OLS_PASSWORD=${OLS_PASSWORD:-admin123}
    restart: unless-stopped
    depends_on:
      - wordpress

  mail-relay:
    image: juanluisbaptiste/postfix-relay
    command: >
      sh -c "
      echo '/^Subject:/ PREPEND X-SES-TENANT: $${SES_TENANT_TAG:-default}' > /etc/postfix/header_checks &&
      postconf -e 'smtp_header_checks = regexp:/etc/postfix/header_checks' &&
      exec /run.sh
      "
    environment:
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-localhost}
      - SES_TENANT_TAG=${SES_TENANT_TAG}
    restart: unless-stopped

volumes:
  wp_app:
