services:
  wordpress:
    build: .
    volumes:
      - wp_app:/var/www/html
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./php/mail.ini:/usr/local/etc/php/conf.d/mail.ini
      - ./php/fpm-pool.conf:/usr/local/etc/php-fpm.d/zz-dokploy.conf
      - ./php/msmtprc:/etc/msmtprc:ro
      - ./php/adminer-auth.php:/var/www/html/adminer-auth.php
    command: >
      sh -c "
      sed -i 's/WORDPRESS_MEMORY_LIMIT_PLACEHOLDER/$${WORDPRESS_MEMORY_LIMIT:-256M}/g' /usr/local/etc/php/conf.d/uploads.ini &&
      sed -i 's/FPM_PM_TYPE_PLACEHOLDER/$${PHP_FPM_PM:-dynamic}/g' /usr/local/etc/php-fpm.d/zz-dokploy.conf &&
      sed -i 's/FPM_MAX_CHILDREN_PLACEHOLDER/$${PHP_FPM_MAX_CHILDREN:-5}/g' /usr/local/etc/php-fpm.d/zz-dokploy.conf &&
      sed -i 's/FPM_START_SERVERS_PLACEHOLDER/$${PHP_FPM_START_SERVERS:-1}/g' /usr/local/etc/php-fpm.d/zz-dokploy.conf &&
      sed -i 's/FPM_MIN_SPARE_SERVERS_PLACEHOLDER/$${PHP_FPM_MIN_SPARE_SERVERS:-1}/g' /usr/local/etc/php-fpm.d/zz-dokploy.conf &&
      sed -i 's/FPM_MAX_SPARE_SERVERS_PLACEHOLDER/$${PHP_FPM_MAX_SPARE_SERVERS:-2}/g' /usr/local/etc/php-fpm.d/zz-dokploy.conf &&
      sed -i 's/FPM_IDLE_TIMEOUT_PLACEHOLDER/$${PHP_FPM_IDLE_TIMEOUT:-10s}/g' /usr/local/etc/php-fpm.d/zz-dokploy.conf &&
      /usr/local/bin/docker-entrypoint.sh php-fpm
      "
    env_file:
      - .env
    linux_parameters:
      init: true
    environment:
      - ADMINER_DESIGN=${ADMINER_DESIGN:-pepa-linha}
    restart: unless-stopped

  ols:
    image: litespeedtech/openlitespeed:latest
    command: >
      sh -c "
      export FM_PATH=$${FILE_MANAGER_PATH:-/file-manager-secret} &&
      export DB_PATH=$${DB_MANAGER_PATH:-/wp-db-admin} &&
      export FM_PATH_SLASH=$${FM_PATH%/}/ &&
      export FM_PATH_NO_SLASH=$${FM_PATH%/} &&
      sed -i \"s|FILE_MANAGER_PATH_PLACEHOLDER|$$FM_PATH_SLASH|g\" /usr/local/lsws/conf/vhosts/Example/vhconf.conf &&
      sed -i \"s|FILE_MANAGER_PATH_STRIPPED|$$FM_PATH_NO_SLASH|g\" /usr/local/lsws/conf/vhosts/Example/vhconf.conf &&
      sed -i \"s|DB_MANAGER_PATH_PLACEHOLDER|$$DB_PATH|g\" /usr/local/lsws/conf/vhosts/Example/vhconf.conf &&
      /usr/local/lsws/bin/lswsctrl start &&
      tail -f /usr/local/lsws/logs/error.log
      "
    volumes:
      - wp_app:/var/www/html
      - ./ols/vhconf.conf:/usr/local/lsws/conf/vhosts/Example/vhconf.conf
    environment:
      - OLS_PASSWORD=${OLS_PASSWORD:-admin123}
      - FILE_MANAGER_PATH=${FILE_MANAGER_PATH:-/file-manager-secret}
      - DB_MANAGER_PATH=${DB_MANAGER_PATH:-/wp-db-admin}
    restart: unless-stopped
    depends_on:
      - wordpress

  mail-relay:
    image: juanluisbaptiste/postfix-relay
    command: >
      sh -c "
      echo '/^Subject:/ PREPEND X-SES-TENANT: $${SES_TENANT_TAG:-default}' > /etc/postfix/header_checks &&
      postconf -e 'smtp_header_checks = regexp:/etc/postfix/header_checks' &&
      exec /run.sh
      "
    environment:
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-localhost}
      - SES_TENANT_TAG=${SES_TENANT_TAG}
    restart: unless-stopped

  file-manager:
    image: filebrowser/filebrowser:latest
    user: "33:33"
    command: >
      sh -c "
      if [ ! -f /database/filebrowser.db ]; then
        /filebrowser config init --database /database/filebrowser.db &&
        /filebrowser config set --database /database/filebrowser.db --baseurl /file-manager &&
        /filebrowser users add $${FILE_MANAGER_USER:-admin} $${FILE_MANAGER_PASSWORD:-admin123} --perm.admin --database /database/filebrowser.db
      fi &&
      /filebrowser server --database /database/filebrowser.db
      "
    volumes:
      - wp_app:/srv
      - filebrowser_db:/database
    environment:
      - FILE_MANAGER_USER=${FILE_MANAGER_USER:-admin}
      - FILE_MANAGER_PASSWORD=${FILE_MANAGER_PASSWORD}
      - FB_BASEURL=${FILE_MANAGER_PATH:-/file-manager-secret}
    restart: unless-stopped

volumes:
  wp_app:
  filebrowser_db:
