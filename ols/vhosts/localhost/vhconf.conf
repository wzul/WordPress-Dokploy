docRoot                   /var/www/html
index  {
  useServer               0
  indexFiles              index.php, index.html
}

# 1. Real IP Detection (Trust Dokploy/Proxy Headers)
accessControl  {
  allow                   *
}

# 2. Per-Client Throttling (High-Performance Fail2Ban)
# Blocks IPs that spam requests (Brute force protection)
perClientConnLimit  {
  staticReqLimit          100
  dynamicReqLimit         5
  outBandwidth            0
  inBandwidth             0
  softLimit               1000
  hardLimit               1500
  gracePeriod             15
  banPeriod               300
}

scripthttpConfig  {
  libPath                 modules/lsapi.so
  maxConn                 100
  env                     LSAPI_MAX_REQS=500
  env                     LSAPI_MAX_IDLE=60
}

rewrite  {
  enable                  1
  autoLoadHtaccess        1
  rules                   <<<END_rules
# WordPress Basic Rewrites
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule . /index.php [L]
  END_rules
}
