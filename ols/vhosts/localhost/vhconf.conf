docRoot                   /var/www/html
index  {
  useServer               0
  indexFiles              index.php, index.html
}


extprocessor filemanager {
  type                    proxy
  address                 http://file-manager:80
  maxConns                100
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

context FILE_MANAGER_PATH_PLACEHOLDER {
  type                    proxy
  handler                 filemanager
  addDefaultCharset       off
}

rewrite  {
  enable                  1
  autoLoadHtaccess        1
  rules                   <<<END_rules
RewriteRule ^FILE_MANAGER_PATH_STRIPPED$ FILE_MANAGER_PATH_STRIPPED/ [R=301,L]
RewriteRule ^DB_MANAGER_PATH_PLACEHOLDER$ /adminer-auth.php [L]

# WordPress Basic Rewrites
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule . /index.php [L]
  END_rules
}
