[variables]
# Use these variables to configure your WordPress deployment directly from Dokploy UI.
WORDPRESS_DB_HOST = "wp_db"
WORDPRESS_DB_NAME = "wordpress"
WORDPRESS_DB_USER = "wordpress"
WORDPRESS_DB_PASSWORD = "${randomPassword}"
WORDPRESS_MEMORY_LIMIT = "256M"

[[config.domains]]
name = "nginx"
port = 80

[[config.env]]
serviceName = "wordpress"
name = "WORDPRESS_DB_HOST"
value = "${WORDPRESS_DB_HOST}"

[[config.env]]
serviceName = "wordpress"
name = "WORDPRESS_DB_NAME"
value = "${WORDPRESS_DB_NAME}"

[[config.env]]
serviceName = "wordpress"
name = "WORDPRESS_DB_USER"
value = "${WORDPRESS_DB_USER}"

[[config.env]]
serviceName = "wordpress"
name = "WORDPRESS_DB_PASSWORD"
value = "${WORDPRESS_DB_PASSWORD}"

[[config.env]]
serviceName = "wordpress"
name = "WORDPRESS_CONFIG_EXTRA"
value = """
define('WP_MEMORY_LIMIT', '${WORDPRESS_MEMORY_LIMIT}');
define('DISALLOW_FILE_EDIT', true);
"""

[[config.mounts]]
serviceName = "wordpress"
source = "./php/uploads.ini"
content = "/usr/local/etc/php/conf.d/uploads.ini"

[[config.mounts]]
serviceName = "wordpress"
source = "./php/opcache.ini"
content = "/usr/local/etc/php/conf.d/opcache.ini"

[[config.mounts]]
serviceName = "wordpress"
source = "./php/z-dokploy-overrides.ini"
content = "/usr/local/etc/php/conf.d/z-dokploy-overrides.ini"

[[config.mounts]]
serviceName = "wordpress"
source = "./php/fpm-pool.conf"
content = "/usr/local/etc/php-fpm.d/zz-dokploy.conf"

[[config.mounts]]
serviceName = "nginx"
source = "./nginx/default.conf"
content = "/etc/nginx/conf.d/default.conf"
